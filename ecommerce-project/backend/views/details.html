<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Ecommerce</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <header class="main-header">
        <div class="container nav-flex">
            <div class="logo">Ali's Shop</div>
            <nav>
                <a href="/">Home</a>
                <a href="/products">Products</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="details-layout">
            <div class="details-image">
                <img src="https://via.placeholder.com/400" alt="Product Image">
            </div>

            <div class="details-info">
                <nav class="breadcrumb">Home > Products > Detail</nav>
                <h1>Premium Product Name</h1>
                <p class="price">$129.00</p>
                <p class="description">
                    This is a high-quality item designed for maximum durability and style. 
                    It features an ergonomic design and premium materials.
                </p>
                <div class="actions">
                    <button class="btn-primary">Add to Cart</button>
                    <button class="btn-secondary">Wishlist</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer-section">
        <div class="container">
            <p>© 2026 Ecommerce - All Rights Reserved</p>
        </div>
    </footer>

</body>
</html>
